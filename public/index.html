<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Login Section -->
    <div id="login-section">
      <div class="card login-card">
        <h1>Taskboard</h1>
        <p class="subtitle">Connectez-vous pour gérer vos tâches</p>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" placeholder="admin" required>
          </div>
          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" placeholder="••••••" required>
          </div>
          <button type="submit" class="btn btn-primary">Se connecter</button>
          <p id="login-error" class="error hidden"></p>
        </form>
      </div>
    </div>

    <!-- Tasks Section -->
    <div id="tasks-section" class="hidden">
      <header>
        <h1>Taskboard</h1>
        <div class="header-actions">
          <span id="current-user"></span>
          <button id="logout-btn" class="btn btn-secondary">Déconnexion</button>
        </div>
      </header>

      <div class="toolbar">
        <button id="add-task-btn" class="btn btn-primary">+ Nouvelle tâche</button>
        <div class="filter-group">
          <label>Filtrer :</label>
          <select id="status-filter">
            <option value="">Toutes</option>
            <option value="todo">À faire</option>
            <option value="in-progress">En cours</option>
            <option value="done">Terminées</option>
          </select>
        </div>
      </div>

      <!-- New Task Form -->
      <div id="task-form-container" class="card hidden">
        <h3 id="form-title">Nouvelle tâche</h3>
        <form id="task-form">
          <input type="hidden" id="task-id">
          <div class="form-group">
            <label for="task-title">Titre</label>
            <input type="text" id="task-title" placeholder="Titre de la tâche" required>
          </div>
          <div class="form-group">
            <label for="task-description">Description</label>
            <textarea id="task-description" placeholder="Description (optionnel)" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="task-status">Statut</label>
            <select id="task-status">
              <option value="todo">À faire</option>
              <option value="in-progress">En cours</option>
              <option value="done">Terminée</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <button type="button" id="cancel-btn" class="btn btn-secondary">Annuler</button>
          </div>
        </form>
      </div>

      <!-- Task List -->
      <div id="task-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
